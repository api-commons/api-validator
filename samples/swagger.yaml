swagger: "2.0"
info:
  title: Pet Store
  version: "1.0.0"
host: api.example.com
basePath: /v1
schemes:
  - https
produces:
  - application/json
paths:
  /pets:
    get:
      operationId: listPets
      summary: List pets
      responses:
        "200":
          description: A list of pets.
          schema:
            type: array
            items:
              $ref: "#/definitions/Pet"
definitions:
  Pet:
    type: object
    properties:
      id:
        type: integer
      name:
        type: string
